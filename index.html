<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>9 Grid Layouts</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main">

  <!-- Layout 1 -->

  <div class="layout layout1">

    <div class="dark"></div>
    <div class="dark"></div>
    <div class="dark"></div>

    <div class="dark"></div>
    <div class="dark"></div>
    <div class="dark"></div>

    <div class="dark"></div>
    <div class="dark"></div>
    <div class="dark"></div>

  </div>

  <!-- Layout 2 -->

  <div class="layout layout2">

    <div class="dark big"></div>
    <div class="light small"></div>

  </div>

  <!-- Layout 3 -->

  <div class="layout layout3">

    <div class="dark top"></div>
    <div class="dark"></div>

    <div class="light"></div>

  </div>

  <!-- Layout 4 -->

  <div class="layout layout4">

    <div class="dark header"></div>

    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>

  </div>

  <!-- Layout 5 -->

  <div class="layout layout5">

    <div class="dark"></div>
    <div class="dark"></div>
    <div class="light"></div>

    <div class="dark"></div>
    <div class="dark"></div>
    <div class="light"></div>

    <div class="empty"></div>
    <div class="empty"></div>
    <div class="light"></div>

  </div>

  <!-- Layout 6 -->

  <div class="layout layout6">

    <div class="dark big"></div>

    <div class="light"></div>
    <div class="light"></div>

  </div>

  <!-- Layout 7 -->

  <div class="layout layout7">

    <div class="dark top-left"></div>
    <div class="dark"></div>

    <div class="light"></div>
    <div class="light"></div>

  </div>

  <!-- Layout 8 -->

  <div class="layout layout8">

    <div class="dark"></div>
    <div class="dark"></div>
    <div class="dark"></div>

    <div class="light bottom"></div>
    <div class="light"></div>

  </div>

  <!-- Layout 9 -->

  <div class="layout layout9">

    <div class="dark"></div>
    <div class="light side"></div>

    <div class="light"></div>

  </div>

</div>
  
<footer align="center"  > 
  <p>&copy; 2026 Grid Layout. All rights reserved.</p>
</footer>

</body>
</html>
